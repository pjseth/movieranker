<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>filmfavs prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand">
        <h1>Filmfavs</h1>
        <p class="tag">Rank your favorite movies — the smart comparative way</p>
      </div>
      <nav class="site-nav">
        <button id="nav-home">Home</button>
        <button id="nav-mylist">My List</button>
        <button id="nav-unwatched">Unwatched</button>
        <button id="nav-undo" style="display:none">Undo</button>
        <button id="nav-signin">Sign In</button>
        <button id="nav-signup">Sign Up</button>
        <button id="nav-logout" style="display:none">Log Out</button>
      </nav>
    </header>
    <main id="app"></main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
